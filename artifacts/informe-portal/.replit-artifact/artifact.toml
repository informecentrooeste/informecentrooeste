kind = "web"
previewPath = "/"
title = "Informe Centro-Oeste"
version = "1.0.0"
id = "artifacts/informe-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23075
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/informe-portal run dev"

[services.env]
PORT = "23075"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/informe-portal", "run", "build"]
publicDir = "artifacts/informe-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
